<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erasmus+ Zpráva</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .header { text-align: center; border-bottom: 2px solid #003399; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: #003399; font-size: 20px; margin: 5px 0; }
        h2 { color: #555; font-size: 16px; margin: 0; font-weight: normal; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        small { color: #666; font-style: italic; display: block; margin-bottom: 10px; }
        button { background: #003399; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #d9534f; background: #f2dede; padding: 15px; border-radius: 5px; margin-top: 20px; border: 1px solid #ebccd1; }

        /* OPRAVA PRO MOBILNÍ KLÁVESNICI A LOGO EU */
        #formZprava {
            padding-bottom: 50px; 
        }
        .eu-footer {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 300px; /* Tento prostor schová klávesnici na mobilu */
        }
        .eu-logo {
            max-width: 180px;
            height: auto;
            opacity: 0.9;
        }

        /* Spinner (načítací kolečko) */
        .spinner {
            display: none;
            width: 30px;
            height: 30px;
            margin: 15px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003399;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Děkovná stránka */
        .success-box { text-align: center; padding: 20px 0; }
        .success-icon { font-size: 50px; color: #28a745; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="box" id="step1">
    <div class="header"><h1>Zpětná vazba po návratu z mobility</h1></div>
    <p>Zadejte prosím přístupový kód:</p>
    <input type="text" id="kodVstup" placeholder="přístupový kód">
    <button style="margin-top:15px" id="btnNacist" onclick="overitKod()">Načíst formulář</button>
    <div id="loader1" class="spinner"></div>
    <div id="errorMsg" class="hidden error"></div>
</div>

<div class="box hidden" id="step2">
    <div class="header">
        <h1 id="dynProjekt"></h1>
        <h2 id="dynOrg"></h2>
    </div>
    
    <p style="background: #eef2ff; padding: 15px; border-left: 4px solid #003399; font-size: 15px;">
        Prosím vyplňte odpovědi na následující otázky. Je to pro nás cenný zdroj informací. Děkujeme!
    </p>

    <form id="formZprava">
        <div class="input-group"><label>Vaše jméno a příjmení</label><input type="text" id="jmeno" required></div>
        <div class="input-group"><label>Kde se mobilita uskutečnila? (Město / Stát)</label><input type="text" id="misto" required></div>
        <div class="input-group"><label>V jakém období se mobilita uskutečnila? (Měsíc a rok)</label><input type="text" id="datum" required></div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
        <div id="otazkyArea"></div>
        
        <button type="submit" id="btnOdeslat">Odeslat</button>
        <div id="loader2" class="spinner"></div>

        <div class="eu-footer">
    <img src="https://73fa46b4e5.cbaul-cdnwnd.com/1d081e832eb443f8a46a00ec9a631ec7/200000019-1aa8b1aa8c/CS_fundedbyEU_VERTICAL_RGB_POS.webp?ph=73fa46b4e5" 
         alt="Logo EU" 
         class="eu-logo">
    <p style="color: #666; margin-top: 15px; font-size: 13px;">Financováno Evropskou unií</p>
</div>
    </form>
</div>

<div class="box hidden" id="stepSuccess">
    <div class="success-box">
        <div class="success-icon">✓</div>
        <h1>Úspěšně odesláno</h1>
        <p>Vaše zpětná vazba byla úspěšně odeslána. Děkujeme!</p>
        <p style="color: #666; margin-top: 25px; font-weight: bold;">Toto okno můžete nyní zavřít.</p>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQ2or0mdhAACixk6DSevhDcCNI6B1VdTyLMWdjc1bFsIWO1xVfFdKzci9EdsNGmKbq/exec";
    let aktualniKod = "";

    async function overitKod() {
        const kod = document.getElementById('kodVstup').value.trim();
        const errDiv = document.getElementById('errorMsg');
        const loader = document.getElementById('loader1');
        const btn = document.getElementById('btnNacist');

        if (!kod) return;

        errDiv.classList.add('hidden');
        loader.style.display = 'block';
        btn.disabled = true;

        try {
            const res = await fetch(`${SCRIPT_URL}?answ=1&kod=${encodeURIComponent(kod)}`);
            const data = await res.json();

            if (data.ok) {
                aktualniKod = kod;
                zobrazFormular(data);
            } else {
                errDiv.innerHTML = `Kód <strong>${kod}</strong> nebyl nalezen. Ujistěte se, že jste jej zadali správně, případně kontaktujte správce.`;
                errDiv.classList.remove('hidden');
                btn.disabled = false;
            }
        } catch (e) {
            alert("Chyba při komunikaci se serverem.");
            btn.disabled = false;
        } finally {
            loader.style.display = 'none';
        }
    }

    function zobrazFormular(data) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('dynProjekt').innerText = data.projekt;
        document.getElementById('dynOrg').innerText = data.organizace;

        const area = document.getElementById('otazkyArea');
        area.innerHTML = '';
        data.otazky.sort((a,b) => a.cislo - b.cislo).forEach((o, i) => {
            area.innerHTML += `
                <div class="input-group">
                    <label>${o.text}</label>
                    <small>${o.hint}</small>
                    <textarea id="odpoved${i+1}" rows="4" required></textarea>
                </div>`;
        });
    }

    document.getElementById('formZprava').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnOdeslat');
        const loader = document.getElementById('loader2');

        btn.disabled = true;
        loader.style.display = 'block';

        const payload = {
            jmeno: document.getElementById('jmeno').value,
            misto: document.getElementById('misto').value,
            datum: document.getElementById('datum').value,
            kod: aktualniKod,
            odpoved1: document.getElementById('odpoved1').value,
            odpoved2: document.getElementById('odpoved2').value,
            odpoved3: document.getElementById('odpoved3').value
        };

        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            if (response.ok) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('stepSuccess').classList.remove('hidden');
            } else {
                throw new Error("Server error");
            }
        } catch (e) {
            alert("Chyba při ukládání. Zkuste to prosím znovu.");
            btn.disabled = false;
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
